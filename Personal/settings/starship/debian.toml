# Configure the format of the prompt
format = """$all"""

# Disable the blank line at the start of the prompt
add_newline = false

# Timeout for commands executed by starship (in milliseconds)
command_timeout = 5000

# Disables the line_break module, making the prompt a single line
[line_break]
disabled = true

[hostname]
ssh_only = false
ssh_symbol = "¯¼ü "
format = '[ ´îå ](bold red) '
trim_at = "."
disabled = false

# Replace the "ÔØ»" symbol in the prompt with "ÔŞ£" or "ÔŞñ"
[character]
success_symbol = "[ÔØ»](bold red)[ÔØ»](bold yellow)[ÔØ»](bold green)"
error_symbol = "[Ô£ù](bold red)"
vimcmd_symbol = "[ÔØ«](green)"

[directory]
read_only = " ¾░î¥"
truncation_length = 10
truncate_to_repo = true
style = "bold italic blue"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = true
style = "bold italic red"

